<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ウェブスキAG スクリプト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ========== RESET & ROOT ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--navy-l:#2E5FAA;
  --orange:#E07020;--green:#1E7A4A;--green-l:#27AE60;
  --red:#C0392B;--teal:#0E7490;
  --yellow:#F5A623;--purple:#7B2FBE;
  --bg:#F5F6FA;--white:#fff;
  --text:#1A1A2E;--text-s:#4A4A6A;--text-xs:#8888A8;
  --border:#DDE1EC;
  --radius:12px;--radius-s:8px;
  --shadow-s:0 2px 8px rgba(27,58,107,.08);
  --shadow-m:0 4px 20px rgba(27,58,107,.13);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ========== PAGES ========== */
.page{display:none;min-height:100vh;flex-direction:column}
.page.active{display:flex}

/* ========== TOP NAV BAR ========== */
#top-nav{background:var(--navy);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:50}
#top-nav .nav-logo{font-size:15px;font-weight:900;letter-spacing:-.3px}
#top-nav .nav-logo span{color:var(--orange)}
#top-nav .nav-spacer{flex:1}
#top-nav .nav-user{font-size:11px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.nav-back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;transition:background .15s}
.nav-back-btn:hover{background:rgba(255,255,255,.25)}
.nav-icon-btn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;transition:all .15s}
.nav-icon-btn:hover{background:rgba(255,255,255,.22)}

/* ========== LOGIN PAGE ========== */
#page-login{align-items:center;justify-content:center;background:linear-gradient(135deg,#0F2147 0%,#1B3A6B 60%,#2E5FAA 100%)}
.login-box{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .ll-main{font-size:22px;font-weight:900;color:var(--navy);letter-spacing:-.5px}
.login-logo .ll-main span{color:var(--orange)}
.login-logo .ll-sub{font-size:11px;color:var(--text-xs);margin-top:2px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;font-weight:700;color:var(--text-s);margin-bottom:5px}
.login-field input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-s);font-size:14px;outline:none;transition:border-color .15s}
.login-field input:focus{border-color:var(--navy-l)}
.login-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-s);font-size:14px;font-weight:700;margin-top:6px;transition:opacity .15s}
.login-btn:hover{opacity:.88}
.login-btn:disabled{opacity:.5;cursor:default}
.login-error{font-size:12px;color:var(--red);margin-top:8px;text-align:center;min-height:18px}

/* ========== TOP PAGE ========== */
#page-top .top-body{flex:1;padding:24px 16px}
.top-greeting{font-size:13px;color:var(--text-s);margin-bottom:4px}
.top-name{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:24px}
.top-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.top-menu-btn{background:#fff;border:2px solid var(--border);border-radius:16px;padding:24px 16px;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:8px}
.top-menu-btn:hover{border-color:var(--navy-l);box-shadow:var(--shadow-m);transform:translateY(-2px)}
.top-menu-btn .tmb-icon{font-size:32px}
.top-menu-btn .tmb-label{font-size:13px;font-weight:700;color:var(--navy)}
.top-menu-btn .tmb-desc{font-size:10px;color:var(--text-xs);line-height:1.4}
.top-menu-admin{grid-column:1/-1;border-color:#E8D5F5;background:#FAF5FF}
.top-menu-admin .tmb-label{color:var(--purple)}

/* ========== STAFF SELECT PAGE ========== */
#page-staff .staff-body{flex:1;padding:16px}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.staff-card{background:#fff;border:2px solid var(--border);border-radius:12px;padding:20px 12px;text-align:center;transition:all .15s}
.staff-card:hover{border-color:var(--navy-l);box-shadow:var(--shadow-s)}
.staff-card .sc-avatar{width:48px;height:48px;border-radius:50%;background:var(--navy);color:#fff;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.staff-card .sc-name{font-size:13px;font-weight:700;color:var(--navy)}
.staff-card .sc-role{font-size:10px;color:var(--text-xs);margin-top:2px}

/* ========== ADMIN PAGE ========== */
#admin-pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:16px}
#admin-pw-modal.open{display:flex}
.admin-pw-box{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:320px}
.admin-pw-box h3{font-size:16px;font-weight:900;color:var(--purple);margin-bottom:16px;text-align:center}
.admin-pw-box input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-s);font-size:14px;outline:none;margin-bottom:10px}
.admin-pw-box input:focus{border-color:var(--purple)}
.admin-pw-error{font-size:11px;color:var(--red);margin-bottom:8px;min-height:16px}
.admin-pw-btn{width:100%;padding:10px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-s);font-weight:700;font-size:13px}

#page-admin .admin-body{flex:1;padding:16px;overflow-y:auto}
.admin-section{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;border:1.5px solid var(--border)}
.admin-section-title{font-size:12px;font-weight:700;color:var(--text-xs);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.admin-user-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.admin-user-row:last-child{border-bottom:none}
.admin-user-avatar{width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.admin-user-info{flex:1;min-width:0}
.admin-user-name{font-size:13px;font-weight:700;color:var(--text)}
.admin-user-meta{font-size:10px;color:var(--text-xs);margin-top:1px}
.admin-user-actions{display:flex;gap:5px;flex-shrink:0}
.au-btn{font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;border:none;transition:all .12s}
.au-btn.reset{background:#EEF3FC;color:var(--navy)}
.au-btn.reset:hover{background:#dde6f7}
.au-btn.delete{background:#FFEBEE;color:var(--red)}
.au-btn.delete:hover{background:#ffcdd2}
.au-btn.badge-admin{background:#F3E5F5;color:var(--purple)}
.add-user-form{display:flex;flex-direction:column;gap:8px}
.add-user-row{display:flex;gap:8px}
.add-user-row input,.add-user-row select{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-s);font-size:12px;outline:none}
.add-user-row input:focus,.add-user-row select:focus{border-color:var(--navy-l)}
.add-user-btn{padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-s);font-size:12px;font-weight:700;white-space:nowrap}

/* 集計セクション */
.stats-filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stats-filter-row select,.stats-filter-row input{flex:1;min-width:100px;padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--radius-s);font-size:12px;outline:none}
.stats-filter-row select:focus,.stats-filter-row input:focus{border-color:var(--navy-l)}
.stats-run-btn{padding:7px 16px;background:var(--teal);color:#fff;border:none;border-radius:var(--radius-s);font-size:12px;font-weight:700;white-space:nowrap}
.stats-checklist{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.stats-checklist label{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--text-s);background:var(--bg);padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer}
.stats-checklist input[type=checkbox]{accent-color:var(--teal)}
#stats-result{font-size:12px}
.stats-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.stat-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-s);padding:10px;text-align:center}
.stat-card-num{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}
.stat-card-label{font-size:9px;color:var(--text-xs);font-weight:700;margin-top:2px}
.stats-table{width:100%;border-collapse:collapse;font-size:11px}
.stats-table th{background:var(--bg);padding:6px 8px;text-align:left;font-weight:700;color:var(--text-xs);border-bottom:2px solid var(--border)}
.stats-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.stats-table tr:hover td{background:#F8F9FE}

/* ========== RECORDS PAGE ========== */
#page-records .records-body{flex:1;padding:16px;overflow-y:auto}
.records-filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.records-filter select,.records-filter input{flex:1;min-width:110px;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-s);font-size:12px;outline:none;background:#fff}
.records-filter select:focus,.records-filter input:focus{border-color:var(--navy-l)}
.rec-stats{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.rec-stat{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-s);padding:8px 12px;text-align:center;flex-shrink:0;min-width:70px}
.rec-stat-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:700}
.rec-stat-label{font-size:9px;color:var(--text-xs);font-weight:700}
.rec-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-s);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.rec-card:hover{border-color:var(--navy-l)}
.rec-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rec-result-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}
.rc-won{background:#E8F5E9;color:#2E7D32}
.rc-pending{background:#FFF8E1;color:#7A5800}
.rc-cut{background:#F3E5F5;color:#6A1B9A}
.rc-bridge{background:#E8EAF6;color:#283593}
.rc-lost{background:#FFEBEE;color:#C62828}
.rc-money{background:#FFF3E0;color:#E65100}
.rec-card-name{font-size:13px;font-weight:700;flex:1}
.rec-card-date{font-size:10px;color:var(--text-xs)}
.rec-card-staff{font-size:10px;color:var(--text-xs);margin-bottom:5px}
.rec-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.rec-tag{font-size:9px;padding:1px 6px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text-s)}
.rec-yes{display:flex;gap:10px;font-size:10px;color:var(--text-xs)}
.rec-yes-n{font-family:'DM Mono',monospace;font-weight:700;font-size:12px}
.br-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);font-size:10px;color:var(--text-xs)}
.br-select{font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:2px 6px;border:1.5px solid var(--border);border-radius:4px;background:#fff;color:var(--text);outline:none}
.br-badge{font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px}
.br-pre{background:#F3F4F6;color:#6B7280}
.br-won{background:#E8F5E9;color:#2E7D32}
.br-lost{background:#FFEBEE;color:#C62828}
.br-jump{background:#FFF3E0;color:#E65100}
.br-followup{background:#E8EAF6;color:#283593}

/* ========== SCRIPT PAGE WRAPPER ========== */
#page-script{display:flex;flex-direction:column;overflow:hidden;height:100vh}
#script-wrap{overflow:hidden}

/* ========== MODAL (records detail) ========== */
#rec-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:16px}
#rec-modal.open{display:flex}
#rec-modal-inner{background:#fff;border-radius:var(--radius);width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:16px}
#rec-modal-close{float:right;background:none;border:none;font-size:18px;color:var(--text-xs);cursor:pointer}
.rm-section{font-size:9px;font-weight:700;color:var(--text-xs);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 5px;border-top:1px solid var(--border);padding-top:8px}
.rm-row{display:flex;gap:8px;margin-bottom:4px;font-size:11px}
.rm-label{color:var(--text-xs);font-weight:700;width:70px;flex-shrink:0}
.rm-val{flex:1;line-height:1.5}
.rm-del-btn{font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:5px 12px;border:1.5px solid var(--red);color:var(--red);background:#fff;border-radius:var(--radius-s);cursor:pointer;margin-top:14px}

/* ========== NOTIF ========== */
#app-notif{position:fixed;top:60px;right:12px;background:var(--navy);color:#fff;border-radius:var(--radius);padding:8px 14px;font-size:11px;font-weight:500;box-shadow:var(--shadow-m);transform:translateY(-8px);opacity:0;transition:all .2s;pointer-events:none;z-index:999;border-left:3px solid var(--orange)}
#app-notif.show{opacity:1;transform:translateY(0)}

/* ========== TOAST / LOADING ========== */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:999;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--navy)}
#loading-overlay.show{display:flex}
</style>
</head>
<body>

<!-- ローディング -->
<div id="loading-overlay" class="show">読み込み中...</div>
<div id="app-notif"></div>

<!-- ========== ログインページ ========== -->
<div id="page-login" class="page">
  <div class="login-box">
    <div class="login-logo">
      <div class="ll-main">ウェブスキ<span>AG</span></div>
      <div class="ll-sub">営業スクリプト</div>
    </div>
    <div class="login-field">
      <label>メールアドレス</label>
      <input type="email" id="login-email" placeholder="name@example.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- ========== トップページ ========== -->
<div id="page-top" class="page">
  <div id="top-nav">
    <div class="nav-logo">ウェブスキ<span>AG</span></div>
    <div class="nav-spacer"></div>
    <span class="nav-user" id="nav-user-name"></span>
    <button class="nav-icon-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="top-body">
    <div class="top-greeting">おつかれさまです</div>
    <div class="top-name" id="top-user-name">ー</div>
    <div class="top-menu-grid">
      <button class="top-menu-btn" onclick="goStaffSelect()">
        <span class="tmb-icon">🎯</span>
        <span class="tmb-label">営業準備</span>
        <span class="tmb-desc">担当者を選んでスクリプトを開始</span>
      </button>
      <button class="top-menu-btn" onclick="goRecords()">
        <span class="tmb-icon">📋</span>
        <span class="tmb-label">商談一覧</span>
        <span class="tmb-desc">全員の商談記録を確認</span>
      </button>
      <button class="top-menu-btn top-menu-admin" onclick="openAdminPwModal()">
        <span class="tmb-icon">⚙️</span>
        <span class="tmb-label">管理者画面</span>
        <span class="tmb-desc">ユーザー管理・集計レポート</span>
      </button>
    </div>
  </div>
</div>

<!-- ========== 担当者選択ページ ========== -->
<div id="page-staff" class="page">
  <div id="top-nav-staff" style="background:var(--navy);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0">
    <button class="nav-back-btn" onclick="goTop()">◀ トップへ</button>
    <span style="font-size:14px;font-weight:700;flex:1;text-align:center">担当者を選ぶ</span>
    <span style="width:60px"></span>
  </div>
  <div class="staff-body">
    <div class="staff-grid" id="staff-grid"></div>
  </div>
</div>

<!-- ========== スクリプトページ ========== -->
<div id="page-script" class="page">
  <div id="top-nav-script" style="background:var(--navy);color:#fff;padding:0 10px;height:52px;display:flex;align-items:center;gap:6px;flex-shrink:0">
    <button class="nav-back-btn" onclick="goTop()">◀ トップへ</button>
    <span style="font-size:11px;font-weight:700;color:rgba(255,255,255,.7);white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis" id="script-staff-label"></span>
    <div id="mode-toggle" style="display:flex;gap:0;background:rgba(255,255,255,.1);border-radius:20px;padding:3px;flex-shrink:0">
      <button class="mode-btn active" onclick="setMode('bridge')">🔗 ブリッジ</button>
      <button class="mode-btn" onclick="setMode('closer')">⚡ クローザー</button>
    </div>
    <div id="stepper" style="display:flex;align-items:center;gap:0;flex:1;overflow:hidden;min-width:0"></div>
    <div id="header-badge" style="font-size:10px;font-weight:700;color:var(--orange-l);white-space:nowrap;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:20px">—</div>
    <div id="ice-temp-badge"></div>
    <button class="nav-icon-btn" onclick="openHistoryPage()">📋</button>
    <button id="reset-btn" style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px;" onclick="resetAll()">リセット</button>
  </div>
  <div id="script-wrap">
    <!-- v14のHTMLがここに入る（動的に挿入） -->
  </div>
</div>

<!-- ========== 商談一覧ページ ========== -->
<div id="page-records" class="page">
  <div style="background:var(--navy);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0">
    <button class="nav-back-btn" onclick="goTop()">◀ トップへ</button>
    <span style="font-size:14px;font-weight:700;flex:1;text-align:center">商談一覧</span>
    <span style="width:60px"></span>
  </div>
  <div class="records-body">
    <div class="rec-stats" id="rec-stats"></div>
    <div class="records-filter">
      <select id="rf-staff" onchange="loadRecords()"><option value="">全員</option></select>
      <select id="rf-result" onchange="loadRecords()">
        <option value="">全結果</option>
        <option value="won">🎉 成約</option>
        <option value="pending">⏳ 保留</option>
        <option value="cut">✂️ 見切り</option>
        <option value="bridge">🔗 ブリッジ</option>
        <option value="lost">❌ 失注</option>
        <option value="money">💸 資金不可</option>
      </select>
      <select id="rf-mode" onchange="loadRecords()">
        <option value="">全モード</option>
        <option value="bridge">ブリッジ</option>
        <option value="closer">クローザー</option>
      </select>
    </div>
    <div id="rec-list"></div>
    <div id="rec-empty" style="display:none;text-align:center;padding:40px;color:var(--text-xs);font-size:13px">記録がありません</div>
  </div>
</div>

<!-- ========== 管理者ページ ========== -->
<div id="page-admin" class="page">
  <div style="background:var(--purple);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0">
    <button class="nav-back-btn" onclick="goTop()">◀ トップへ</button>
    <span style="font-size:14px;font-weight:700;flex:1;text-align:center">管理者画面</span>
    <span style="width:60px"></span>
  </div>
  <div class="admin-body">
    <!-- ユーザー管理 -->
    <div class="admin-section">

<script>
// ============================================================
// SUPABASE 設定
// ============================================================
const SUPABASE_URL = 'https://vpnqazoorznunhyorxoj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Cd5v0WcHah7eiVqlyk2wXA_TlkwFCgl';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASSWORD = 'webski2024admin'; // 管理者画面パスワード（変更可）

// ============================================================
// 状態管理
// ============================================================
let currentUser = null;
let currentProfile = null;
let selectedStaff = null; // {id, name}

let appNotifTimer = null;

// ============================================================
// ユーティリティ
// ============================================================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('show', on);
}

function appNotif(title, body = '') {
  const el = document.getElementById('app-notif');
  el.innerHTML = `<strong>${title}</strong>${body ? ' — ' + body : ''}`;
  el.classList.add('show');
  clearTimeout(appNotifTimer);
  appNotifTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ============================================================
// 認証
// ============================================================
async function initApp() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await onLoggedIn(session.user);
  } else {
    showLoading(false);
    showPage('page-login');
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = 'メールアドレスとパスワードを入力してください'; return; }
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    errEl.textContent = 'メールアドレスまたはパスワードが正しくありません';
    btn.disabled = false;
    btn.textContent = 'ログイン';
    return;
  }
  await onLoggedIn(data.user);
}

async function onLoggedIn(user) {
  showLoading(true);
  currentUser = user;
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;
  document.getElementById('nav-user-name').textContent = profile?.name || user.email;
  document.getElementById('top-user-name').textContent = (profile?.name || user.email) + ' さん';
  showLoading(false);
  showPage('page-top');
}

async function doLogout() {
  if (!confirm('ログアウトしますか？')) return;
  await sb.auth.signOut();
  currentUser = null; currentProfile = null; selectedStaff = null;
  showPage('page-login');
}

// ============================================================
// ナビゲーション
// ============================================================
function goTop() { showPage('page-top'); }

async function goStaffSelect() {
  showPage('page-staff');
  showLoading(true);

const RESULT_CONF = {
  won:{label:'成約',icon:'🎉',cls:'rc-won'}, pending:{label:'保留',icon:'⏳',cls:'rc-pending'},
  cut:{label:'見切り',icon:'✂️',cls:'rc-cut'}, bridge:{label:'ブリッジ',icon:'🔗',cls:'rc-bridge'},
  lost:{label:'失注',icon:'❌',cls:'rc-lost'}, money:{label:'資金不可',icon:'💸',cls:'rc-money'}
};
const BRIDGE_RESULT_CONF = {
  pre:{label:'商談前',icon:'📅',cls:'br-pre'}, won:{label:'成約',icon:'🎉',cls:'br-won'},
  lost:{label:'失注',icon:'❌',cls:'br-lost'}, jump:{label:'プレ飛び',icon:'🏃',cls:'br-jump'},
  followup:{label:'後追い',icon:'📞',cls:'br-followup'}
};

async function loadRecords() {
  showLoading(true);
  let q = sb.from('records').select('*').order('saved_at', { ascending: false });
  const staffEl = document.getElementById('rf-staff');
  const resultEl = document.getElementById('rf-result');
  const modeEl = document.getElementById('rf-mode');
  const staff = staffEl ? staffEl.value : '';
  const result = resultEl ? resultEl.value : '';
  const modeVal = modeEl ? modeEl.value : '';
  if (staff) q = q.eq('user_id', staff);
  if (result) q = q.eq('result', result);
  if (modeVal) q = q.eq('mode', modeVal);
  const { data: records, error } = await q;
  showLoading(false);
  if (error) { console.error('loadRecords error:', error); return; }
  renderRecordsList(records || []);
}

function renderRecordsList(records) {
  // 統計
  const cnt = {won:0,pending:0,cut:0,bridge:0,lost:0,money:0};
  records.forEach(r => { if(cnt[r.result] !== undefined) cnt[r.result]++; });
  const rate = records.length > 0 ? Math.round(cnt.won / records.length * 100) : 0;
  document.getElementById('rec-stats').innerHTML = Object.entries(cnt).map(([k,v]) => {
    const rc = RESULT_CONF[k];
    return `<div class="rec-stat"><div class="rec-stat-num" style="color:${k==='won'?'#2E7D32':k==='lost'?'#C62828':k==='bridge'?'#283593':k==='money'?'#E65100':k==='cut'?'#6A1B9A':'#7A5800'}">${v}</div><div class="rec-stat-label">${rc.icon} ${rc.label}</div></div>`;
  }).join('') + `<div class="rec-stat"><div class="rec-stat-num" style="color:var(--orange)">${rate}%</div><div class="rec-stat-label">成約率</div></div>`;

  const listEl = document.getElementById('rec-list');
  const emptyEl = document.getElementById('rec-empty');
  if (!records.length) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; return; }
  emptyEl.style.display = 'none';

  const iceTempMap = {cold:'🧊',warm:'😊',hot:'😂'};
  listEl.innerHTML = records.map(r => {
    const rc = RESULT_CONF[r.result] || {label:r.result,icon:'?',cls:'rc-pending'};
    const dtStr = r.datetime ? r.datetime.replace('T',' ').slice(0,16) : '';
    const staffName = (window._profilesCache||[]).find(p=>p.id===r.staff_id||p.id===r.user_id)?.name||'';
    const iceIcon = r.ice_temp ? iceTempMap[r.ice_temp] : '';
    const tags = [];
    if (r.age) tags.push(r.age + '歳');
    if (r.selected_job) tags.push(r.selected_job);
    if (r.income && r.income.length) tags.push(r.income[0]);
    if (r.mode) tags.push(r.mode === 'bridge' ? '🔗ブリッジ' : '⚡クローザー');
    const tagHtml = tags.map(t => `<span class="rec-tag">${t}</span>`).join('');
    // ブリッジ後select
    let brRow = '';
    if (r.result === 'bridge' || r.mode === 'bridge') {
      const brRes = r.bridge_result || 'pre';
      const brc = BRIDGE_RESULT_CONF[brRes];
      const opts = Object.entries(BRIDGE_RESULT_CONF).map(([v,bc]) =>
        `<option value="${v}"${brRes===v?' selected':''}>${bc.icon} ${bc.label}</option>`).join('');
      brRow = `<div class="br-row"><span>ブリッジ後：</span><span class="br-badge ${brc.cls}">${brc.icon} ${brc.label}</span><select class="br-select" onchange="updateBridgeResult('${r.id}',this.value)" onclick="event.stopPropagation()">${opts}</select></div>`;
    }
    return `<div class="rec-card" onclick="openRecModal('${r.id}')">
      <div class="rec-card-top">
        <span class="rec-result-badge ${rc.cls}">${rc.icon} ${rc.label}</span>
        <span class="rec-card-name">${r.client_name}${iceIcon ? ' '+iceIcon : ''}</span>
        <span class="rec-card-date">${dtStr}</span>
      </div>
      ${staffName ? `<div class="rec-card-staff">担当：${staffName}</div>` : ''}
      <div class="rec-tags">${tagHtml}</div>
      <div class="rec-yes">🎯 意図的 <span class="rec-yes-n" style="color:var(--navy)">${r.yes_intent}</span>　✨ ポジ <span class="rec-yes-n" style="color:var(--green)">${r.yes_positive}</span>　合計 <span class="rec-yes-n" style="color:var(--orange)">${r.yes_total}</span></div>
      ${brRow}
    </div>`;
  }).join('');
}

  await sb.from('records').update({ bridge_result: val }).eq('id', id);
  const brc = BRIDGE_RESULT_CONF[val];

async function addUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const email = document.getElementById('new-user-email').value.trim();
  const pw = document.getElementById('new-user-pw').value;
  const role = document.getElementById('new-user-role').value;
  const msgEl = document.getElementById('add-user-msg');
  msgEl.style.color = 'var(--red)';
  if (!name || !email || !pw) { msgEl.textContent = '全項目を入力してください'; return; }
  if (pw.length < 8) { msgEl.textContent = 'パスワードは8文字以上'; return; }
  msgEl.textContent = '追加中...';
  msgEl.style.color = 'var(--text-xs)';
  const { data, error } = await sb.auth.admin.createUser({
    email, password: pw,
    user_metadata: { name, role },
    email_confirm: true
  });
  if (error) {
    // fallback: use signUp
    const { data: d2, error: e2 } = await sb.auth.signUp({ email, password: pw, options: { data: { name, role } } });
    if (e2) { msgEl.style.color = 'var(--red)'; msgEl.textContent = 'エラー: ' + e2.message; return; }
  }
  msgEl.style.color = 'var(--green)';
  msgEl.textContent = `${name} を追加しました！`;
  document.getElementById('new-user-name').value = '';
  document.getElementById('new-user-email').value = '';
  document.getElementById('new-user-pw').value = '';
  setTimeout(() => { msgEl.textContent = ''; loadAdminUsers(); }, 2000);
}

async function resetUserPw(id, name) {
  const newPw = prompt(`${name} の新しいパスワードを入力してください（8文字以上）:`);
  if (!newPw) return;
  if (newPw.length < 8) { alert('8文字以上のパスワードを入力してください'); return; }
  const { error } = await sb.auth.admin.updateUserById(id, { password: newPw });
  if (error) { alert('変更に失敗しました: ' + error.message); return; }
  appNotif('🔑 PW変更完了', name + 'さんのパスワードを変更しました');
}

async function deleteUser(id, name) {
  if (!confirm(`${name} を削除しますか？\n※この操作は取り消せません。商談記録も削除されます。`)) return;
  const { error } = await sb.auth.admin.deleteUser(id);
  if (error) {
    // Fallback: profileだけ削除
    await sb.from('profiles').delete().eq('id', id);
  }
  appNotif('🗑 削除完了', name + 'を削除しました');
  loadAdminUsers();
}

async function runStats() {
  const staffId = document.getElementById('stats-staff').value;
  const from = document.getElementById('stats-from').value;
  const to = document.getElementById('stats-to').value;
  const checks = [...document.querySelectorAll('input[name="sc"]:checked')].map(c => c.value);
  
  let q = sb.from('records').select('*, profiles(name)').order('saved_at', { ascending: false });
  if (staffId) q = q.eq('user_id', staffId);
  if (from) q = q.gte('datetime', from);
  if (to) q = q.lte('datetime', to + 'T23:59:59');
  const { data: records } = await q;
  if (!records) return;
  
  let html = '';
  const cnt = {won:0,pending:0,cut:0,bridge:0,lost:0,money:0};
  records.forEach(r => { if(cnt[r.result]!==undefined) cnt[r.result]++; });
  const total = records.length;
  const rate = total > 0 ? Math.round(cnt.won / total * 100) : 0;

  // 総数バッジ
  html += `<div style="font-size:11px;color:var(--text-xs);margin-bottom:10px">対象：<strong style="color:var(--text)">${total}件</strong></div>`;

  if (checks.includes('results')) {
    html += `<div style="font-size:11px;font-weight:700;color:var(--text-xs);margin-bottom:6px">結果内訳</div><div class="stats-card-grid">`;
    Object.entries(cnt).forEach(([k,v]) => {
      const rc = RESULT_CONF[k];
      html += `<div class="stat-card"><div class="stat-card-num" style="color:${k==='won'?'#2E7D32':k==='lost'?'#C62828':k==='bridge'?'#283593':k==='money'?'#E65100':k==='cut'?'#6A1B9A':'#7A5800'}">${v}</div><div class="stat-card-label">${rc.icon} ${rc.label}</div></div>`;
    });
    html += `</div>`;
  }
  if (checks.includes('rate')) {
    html += `<div style="font-size:11px;font-weight:700;color:var(--text-xs);margin-bottom:6px">成約率</div><div style="font-family:'DM Mono',monospace;font-size:28px;font-weight:700;color:var(--orange);margin-bottom:12px">${rate}%</div>`;
  }
  if (checks.includes('yes') && total > 0) {
    const avgI = Math.round(records.reduce((s,r) => s+r.yes_intent,0)/total*10)/10;
    const avgP = Math.round(records.reduce((s,r) => s+r.yes_positive,0)/total*10)/10;
    const avgT = Math.round(records.reduce((s,r) => s+r.yes_total,0)/total*10)/10;
    html += `<div style="font-size:11px;font-weight:700;color:var(--text-xs);margin-bottom:6px">YES平均（全商談）</div><div class="stats-card-grid">
      <div class="stat-card"><div class="stat-card-num" style="color:var(--navy)">${avgI}</div><div class="stat-card-label">🎯 意図的</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:var(--green)">${avgP}</div><div class="stat-card-label">✨ ポジ</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:var(--orange)">${avgT}</div><div class="stat-card-label">合計</div></div>
    </div>`;
    // 成約 vs 失注
    const won = records.filter(r => r.result === 'won');
    const lost = records.filter(r => r.result === 'lost');
    if (won.length && lost.length) {
      const wonAvgP = Math.round(won.reduce((s,r) => s+r.yes_positive,0)/won.length*10)/10;
      const lostAvgP = Math.round(lost.reduce((s,r) => s+r.yes_positive,0)/lost.length*10)/10;
      html += `<div style="font-size:10px;color:var(--text-xs);margin-bottom:10px">成約ポジ平均：<strong style="color:var(--green)">${wonAvgP}</strong>回　失注ポジ平均：<strong style="color:var(--red)">${lostAvgP}</strong>回</div>`;
    }
  }
  if (checks.includes('ice')) {
    const iceCnt = {};
    records.forEach(r => { if(r.ice) iceCnt[r.ice] = (iceCnt[r.ice]||0)+1; });
    const sorted = Object.entries(iceCnt).sort((a,b) => b[1]-a[1]).slice(0,5);
    if (sorted.length) {
      const ICE_LABELS = {name_unique:'名前が珍しい',name_easy:'名前が呼びやすい',look_similar:'髪型・服装が似てる',look_calm:'雰囲気がいい',look_style:'おしゃれ',room_nice:'部屋がきれい',room_cafe:'カフェから',room_work:'職場から',item_pc:'Mac・いいPC',item_earphone:'イヤホン',item_car:'車のキー',face_nervous:'緊張してる',face_smile:'笑顔'};
      html += `<div style="font-size:11px;font-weight:700;color:var(--text-xs);margin-bottom:6px">アイスネタTOP5</div><table class="stats-table"><tr><th>ネタ</th><th>回数</th></tr>`;
      sorted.forEach(([k,v]) => { html += `<tr><td>${ICE_LABELS[k]||k}</td><td>${v}回</td></tr>`; });
      html += `</table><div style="height:10px"></div>`;
    }
  }
  if (checks.includes('job')) {
    const jobCnt = {};
    records.forEach(r => { const j = r.selected_job || (r.job&&r.job[0])||'不明'; jobCnt[j]=(jobCnt[j]||0)+1; });
    const sorted = Object.entries(jobCnt).sort((a,b)=>b[1]-a[1]).slice(0,6);
    if(sorted.length) {
      html += `<div style="font-size:11px;font-weight:700;color:var(--text-xs);margin-bottom:6px">職種分布</div><table class="stats-table"><tr><th>職種</th><th>件数</th></tr>`;
      sorted.forEach(([k,v]) => { html += `<tr><td>${k}</td><td>${v}件</td></tr>`; });
      html += `</table><div style="height:10px"></div>`;
    }
  }
  if (checks.includes('concern')) {
    const cCnt = {};
    records.forEach(r => { (r.concern||[]).forEach(c => { cCnt[c]=(cCnt[c]||0)+1; }); });
    const sorted = Object.entries(cCnt).sort((a,b)=>b[1]-a[1]).slice(0,5);
    if(sorted.length) {
      html += `<div style="font-size:11px;font-weight:700;color:var(--text-xs);margin-bottom:6px">懸念ワードTOP5</div><table class="stats-table"><tr><th>懸念</th><th>件数</th></tr>`;
      sorted.forEach(([k,v]) => { html += `<tr><td>${k}</td><td>${v}件</td></tr>`; });
      html += `</table><div style="height:10px"></div>`;
    }
  }
  if (checks.includes('attr')) {
    const attrCnt = {};
    records.forEach(r => { if(r.attr) attrCnt[r.attr]=(attrCnt[r.attr]||0)+1; });
    const sorted = Object.entries(attrCnt).sort((a,b)=>b[1]-a[1]);
    if(sorted.length) {
      html += `<div style="font-size:11px;font-weight:700;color:var(--text-xs);margin-bottom:6px">属性ルート分布</div><table class="stats-table"><tr><th>属性</th><th>件数</th></tr>`;
      sorted.forEach(([k,v]) => { html += `<tr><td>${k}</td><td>${v}件</td></tr>`; });
      html += `</table><div style="height:10px"></div>`;
    }
  }
  document.getElementById('stats-result').innerHTML = html || '<div style="color:var(--text-xs);font-size:12px">集計項目を選択して「集計」を押してください</div>';
}

  if (!tmpl) return;

             income:[],dream:[],concern:[],attr:null,budget:null,motivation:null,
             attrKeys:[],selectedJob:null};

  // 日時セット
  var now = new Date();

  var dt = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())
           +'T'+pad(now.getHours())+':'+pad(now.getMinutes());

  // 描画
  renderAll();
}

function getSteps(){return ALL_STEPS.filter(function(s){return s.modes.indexOf(mode)>=0;});}

function setMode(m){
  if(m===mode) return;
  // YESカウントが入っていたらリセット確認
  if(yesIntent>0||yesPositive>0){
    if(!confirm('モードを切り替えるとYESカウントがリセットされます。よろしいですか？')){return;}
    yesIntent=0;yesPositive=0;
  }
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(function(b,i){b.classList.toggle('active',i===(m==='bridge'?0:1));});
  currentStep=0;closeBridgeConfirm();
  updateYesGoalLabels();
  renderAll();
}

function getJobTalksForStep(stepId){
  if(!hearing.selectedJob)return null;
  var jt=JOB_TALKS[hearing.selectedJob];
  if(!jt)return null;
  var talks=jt[stepId];
  if(!talks||talks.length===0)return null;
  return {label:jt.label,talks:talks};
}

function renderJobBadge(){
  var badge=document.getElementById('job-badge');
  if(hearing.selectedJob){
    badge.classList.add('show');
    document.getElementById('job-badge-text').textContent=hearing.selectedJob;
  }else{
    badge.classList.remove('show');
  }
}

// 左カラム：キーワードレンダリング（トグル式）
// ============================================================
function renderKeys(){
  var body=document.getElementById('keys-body');
  if(!body) return;
  body.innerHTML=KEY_GROUPS.map(function(g,gi){
    if(groupOpen[g.id]===undefined)groupOpen[g.id]=g.defaultOpen;
    var isOpen=groupOpen[g.id];
    var arrow=isOpen?'▲':'▼';
    var header='<div class="key-group-header" onclick="toggleGroup(\''+g.id+'\')">'
      +'<span class="key-group-label">'+g.label+'</span>'
      +'<span class="key-group-arrow">'+arrow+'</span>'
      +'</div>';
    var bodyClass='key-group-body'+(isOpen?' open':'');
    var innerHtml='';

    if(g.iceGroup){
      var sel=hearing.ice;
      var keys=g.keys.map(function(k,ki){var act=sel===k.val?'tapped orange':'';return '<button class="key-btn orange '+act+'" onclick="tapIce(\''+k.val+'\',\''+k.text.replace(/'/g,"\\'")+'\')">' +k.text+'</button>';}).join('');
      var selKey=sel?g.keys.find(function(k){return k.val===sel}):null;
      var preview=selKey?'<div class="ice-talk-preview">'+selKey.talk+'</div>':'';
      // 温度ボタン（ネタ選択後のみ表示）
      var tempRow='';
      if(sel){
        var ICE_TEMPS=[
          {val:'cold', icon:'🧊', text:'まだ固い',   cls:'active-cold'},
          {val:'warm', icon:'😊', text:'雰囲気和んだ',cls:'active-warm'},
          {val:'hot',  icon:'😂', text:'笑い取れた', cls:'active-hot'}
        ];
        var tempBtns=ICE_TEMPS.map(function(t){
          var active=iceTemp===t.val?t.cls:'';
          return '<button class="ice-temp-btn '+active+'" onclick="setIceTemp(\''+t.val+'\')">'
            +'<span class="itb-icon">'+t.icon+'</span>'
            +'<span class="itb-text">'+t.text+'</span>'
            +'</button>';
        }).join('');
        tempRow='<div class="ice-temp-row"><span class="ice-temp-label">氷解け度</span>'+tempBtns+'</div>';
      }
      innerHtml=keys+preview+tempRow;
    }else if(g.ageGroup){
      var sel=hearing.age;var rows='';
      for(var age=g.min;age<=g.max;age++){var act=sel===age?'tapped green':'';rows+='<button class="key-btn age-btn '+act+'" onclick="tapAge('+age+')">'+age+'</button>';}
      innerHtml='<div class="key-grid age-grid">'+rows+'</div>'+(sel?'<div style="padding:4px 2px;font-size:11px;color:var(--green);font-weight:700;">✓ '+sel+'歳</div>':'');
    }else if(g.attrGroup){
      var keys=ATTR_KEYWORDS.map(function(a){var tapped=hearing.attrKeys.indexOf(a.val)>=0?'tapped':'';return '<button class="key-btn teal '+tapped+'" onclick="tapAttrKey(\''+a.val+'\')">'+a.text+'</button>';}).join('');
      var previews=hearing.attrKeys.map(function(val){var ak=ATTR_KEYWORDS.find(function(a){return a.val===val});if(!ak)return'';return '<div class="attr-talk-preview"><span class="atp-label">'+ak.label+'</span>'+ak.talks.map(function(t){return'<div class="atp-line">'+t+'</div>'}).join('')+'</div>';}).join('');
      innerHtml=keys+previews;
    }else{
      var keys=g.keys.map(function(k,ki){
        var id='key_'+gi+'_'+ki;
        var tapped=tappedKeys.has(id)?'tapped':'';
        // 職業選択ボタンは別スタイル
        if(k.field==='__job'){tapped=(hearing.selectedJob===k.val)?'tapped':'';}
        return '<button class="key-btn '+(k.cls||'')+' '+tapped+'" onclick="tapKey(\''+id+'\',\''+k.field+'\',\''+(k.val||k.text).replace(/'/g,"\\'")+'\',\''+(k.cls||'')+'\')">'+k.text+'</button>';
      }).join('');
      innerHtml=keys;
    }
    return '<div class="key-group"><'+header+'<div class="'+bodyClass+'"><div class="key-grid">'+innerHtml+'</div></div></div>';
  }).join('');
}

function toggleGroup(id){groupOpen[id]=!groupOpen[id];renderKeys();}

function tapAge(age){hearing.age=(hearing.age===age)?null:age;renderKeys();renderSheet();if(hearing.age)showNotif('✓ 年齢',age+'歳');}

function tapIce(val,label){
  var grp=KEY_GROUPS.find(function(g){return g.iceGroup;});
  var k=grp?grp.keys.find(function(k){return k.val===val}):null;
  if(hearing.ice===val){
    hearing.ice=null; iceTemp=null;
  }else{
    hearing.ice=val; iceTemp=null; // ネタ変えたら温度リセット
    showNotif('👁 アイスブレイク',label);
    if(k){var f=document.getElementById('ice-flash');f.textContent=k.talk;f.classList.add('show');clearTimeout(f._t);f._t=setTimeout(function(){f.classList.remove('show')},4000);}
  }
  renderKeys();renderSheet();renderIceBadge();
}

function setIceTemp(val){
  iceTemp=(iceTemp===val)?null:val;
  var labels={cold:'🧊 まだ固い',warm:'😊 雰囲気和んだ',hot:'😂 笑い取れた'};
  if(iceTemp) showNotif('🌡 アイス温度',labels[iceTemp]);
  renderKeys();renderSheet();renderIceBadge();
}

function renderIceBadge(){
  var badge=document.getElementById('ice-temp-badge');
  if(!badge) return;
  if(!iceTemp||!hearing.ice){badge.className='';badge.innerHTML='';return;}
  var conf={cold:{cls:'cold',icon:'🧊',text:'まだ固い'},warm:{cls:'warm',icon:'😊',text:'和んだ'},hot:{cls:'hot',icon:'😂',text:'笑い取れた'}};
  var c=conf[iceTemp];
  badge.className=c.cls;
  badge.innerHTML=c.icon+' '+c.text;
}

function tapAttrKey(val){
  var idx=hearing.attrKeys.indexOf(val);
  if(idx>=0){hearing.attrKeys.splice(idx,1);var cf=document.getElementById('attr-flash');if(cf.dataset.val===val)closeAttrFlash();}
  else{hearing.attrKeys.push(val);showAttrFlash(val);var ak=ATTR_KEYWORDS.find(function(a){return a.val===val});showNotif('🎯 訴求軸',ak?ak.text:val);}
  renderKeys();renderSheet();
}

function showAttrFlash(val){
  var ak=ATTR_KEYWORDS.find(function(a){return a.val===val});if(!ak)return;
  var flash=document.getElementById('attr-flash');
  document.getElementById('af-label').textContent=ak.label;
  document.getElementById('af-lines').innerHTML=ak.talks.map(function(t){return'<div class="af-line">'+t+'</div>'}).join('');
  flash.dataset.val=val;flash.classList.add('show');
  clearTimeout(attrFlashTimer);attrFlashTimer=setTimeout(function(){flash.classList.remove('show')},10000);
}
function closeAttrFlash(){clearTimeout(attrFlashTimer);document.getElementById('attr-flash').classList.remove('show');}
function showNeedsWeakBanner(){document.getElementById('needs-weak-banner').classList.add('show');}
function closeNeedsWeakBanner(){document.getElementById('needs-weak-banner').classList.remove('show');}
function showBridgeConfirm(){document.getElementById('bridge-confirm').classList.add('show');}
function closeBridgeConfirm(){document.getElementById('bridge-confirm').classList.remove('show');}

function bridgeResult(result){
  if(result==='appo'){showNotif('📅 次回アポ','アポ日時を設定してください');closeBridgeConfirm();}
  else if(result==='handoff'){showNotif('🤝 バトンタッチ','先輩を呼んでください');closeBridgeConfirm();}
  else if(result==='ng'){var ci=getSteps().findIndex(function(s){return s.id==='miきり'});if(ci>=0)goTo(ci);closeBridgeConfirm();showNotif('❌ NG','見切りクローズへ');}
}

function tapKey(id,field,val,cls){
  var already=tappedKeys.has(id);
  if(already){tappedKeys.delete(id);}else{tappedKeys.add(id);}

  if(field==='__job'){
    // 職業選択：単一選択
    if(hearing.selectedJob===val){hearing.selectedJob=null;}else{hearing.selectedJob=val;}
    renderKeys();renderSheet();renderGuide();renderJobBadge();
    if(hearing.selectedJob)showNotif('🎯 職業',hearing.selectedJob+'向けトーク切替');
    return;
  }
  if(field==='__yes_intent'){tappedKeys.delete(id);addYes('intent',1);return;}
  if(field==='__yes_positive'){tappedKeys.delete(id);addYes('positive',1);return;}
  if(field==='__close'){if(!already){var ci=getSteps().findIndex(function(s){return s.id==='close'});if(ci>=0)goTo(ci);showNotif('🎉 クロージングへ','ノークロで進む！');}renderKeys();return;}
  if(field==='__concern'){if(!already){var ci=getSteps().findIndex(function(s){return s.id==='concern'});if(ci>=0)goTo(ci);showNotif('⚠ 懸念点処理へ','全肯定→深掘り→教育');}renderKeys();return;}
  if(field==='__money'){if(!already){var ci=getSteps().findIndex(function(s){return s.id==='plan'});if(ci>=0)goTo(ci);showNotif('💴 資金確認へ','プランの話に進む');}renderKeys();return;}
  if(field==='__family'){if(!already){showNotif('👨‍👩‍👧 家族相談','懸念ポイントを引き出す');}renderKeys();return;}
  if(field==='__needs_weak'){flags.needsWeak=!already;if(!already){showNeedsWeakBanner();showNotif('⚠️ ニーズ薄','来場動機を掘り直す');}else if(!flags.visionVague){closeNeedsWeakBanner();}renderKeys();renderSheet();return;}
  if(field==='__vision_vague'){flags.visionVague=!already;if(!already){showNeedsWeakBanner();showNotif('⚠️ ビジョン未定','未来拡張→自分ゴト化の順で進む');}else if(!flags.needsWeak){closeNeedsWeakBanner();}renderKeys();renderSheet();return;}
  if(field==='__study_hard'){flags.studyHard=!already;if(!already){var ci=getSteps().findIndex(function(s){return s.id==='miきり'});if(ci>=0)goTo(ci);showNotif('🚫 見切りクローズへ','勉強時間確保困難');}renderKeys();renderSheet();return;}
  if(field==='edu'){hearing.edu=already?null:val;}
  else if(field==='transfer'){hearing.transfer=already?null:val;}
  else if(field==='attr'){hearing.attr=already?null:val;}
  else if(Array.isArray(hearing[field])){if(already){hearing[field]=hearing[field].filter(function(v){return v!==val});}else{hearing[field].push(val);}}
  renderKeys();renderSheet();
  if(!already)showNotif('✓ 記録',val);
}

// ============================================================
// YES目標値：モード別設計
//
// 【ブリッジ】YESポイント15箇所（意図的13・ポジ2）
//   目的：アポ取り・バトンタッチへの橋渡し
//   意図的YES目標10 / ポジティブ目標1 / 合計目標11
//   ⚠️ ポジが0のままでもアポは取れるが温度感が低い
//      → クローザーへの引き継ぎ時に要申し送り
//
// 【クローザー】YESポイント27箇所（意図的18・ポジ9）
//   目的：成約まで論理×感情を積み上げる
//   意図的YES目標12 / ポジティブ目標6 / 合計目標20
//   ⚠️ 意図的ばかりでポジ3未満 → 失注パターン
// ============================================================
// ============================================================
// クライアント情報・商談結果・ストレージ
// ============================================================
var clientResult=null; // 'won'|'lost'|'pending'|'cut'
// RESULT_CONF & BRIDGE_RESULT_CONF defined in app JS above


function onClientInput(){
  var name=document.getElementById('ci-name').value.trim();
  updateSaveBtn();
}

function setResult(val){
  clientResult=(clientResult===val)?null:val;
  ['won','pending','cut','bridge','lost','money'].forEach(function(r){
    var btn=document.getElementById('rb-'+r);
    if(clientResult===r) btn.className='result-btn active-'+r;
    else btn.className='result-btn';
  });
  if(clientResult) showNotif(RESULT_CONF[clientResult].icon+' 結果記録',RESULT_CONF[clientResult].label);
  updateSaveBtn();
}

function updateSaveBtn(){
  var nameEl=document.getElementById('ci-name');
  var btn=document.getElementById('save-btn');
  if(!nameEl||!btn) return;
  var name=nameEl.value.trim();
  btn.disabled=!(name && clientResult);
}

// 商談データをスナップショットとして保存
async function saveRecord(){
  var name=document.getElementById('ci-name').value.trim();
  var dt=document.getElementById('ci-datetime').value;
  if(!name||!clientResult) return;
  if(!selectedStaff){alert('担当者が選択されていません');return;}
  var record={
    id:'rec_'+Date.now(),
    user_id:selectedStaff.id,
    client_name:name,
    datetime:dt||new Date().toISOString().slice(0,16),
    mode:mode,
    result:clientResult,
    bridge_result:'pre',
    yes_intent:yesIntent,
    yes_positive:yesPositive,
    yes_total:yesIntent+yesPositive,
    ice:hearing.ice,
    ice_temp:iceTemp,
    age:hearing.age?parseInt(hearing.age):null,
    edu:hearing.edu,
    selected_job:hearing.selectedJob,
    job:hearing.job.slice(),
    location:hearing.location.slice(),
    income:hearing.income.slice(),
    dream:hearing.dream.slice(),
    concern:hearing.concern.slice(),
    career:hearing.career.slice(),
    transfer:hearing.transfer,
    attr:hearing.attr,
    attr_keys:hearing.attrKeys.slice(),
    flags:{needsWeak:flags.needsWeak,visionVague:flags.visionVague,studyHard:flags.studyHard},
    saved_at:Date.now()
  };
  var btn=document.getElementById('save-btn');
  if(btn) btn.disabled=true;
  var res=await sb.from('records').insert([record]);
  if(res.error){alert('保存に失敗: '+res.error.message);if(btn)btn.disabled=false;return;}
  showNotif('💾 記録完了',name+'さんの商談を保存しました');
  setTimeout(function(){
    if(confirm('記録しました！新しい商談を始めますか？')){resetAll();}
  },300);
}

// ============================================================
var YES_GOALS_BY_MODE={
  bridge:{
    intent:10, positive:1, total:11,
    goodCond:   function(i,p,t){return i>=10 && p>=1;},
    warnCond:   function(i,p,t){return t>=7 && p===0;},
    dangerCond: function(i,p,t){return t>=10 && p===0;},
    goodMsg:  '🔗 アポ取りのタイミング！ブリッジへ進んでOK',
    warnMsg:  'ポジティブ反応がまだ出ていません。一郎の例えや美容師エピソードを使って',
    dangerMsg:'⚠️ 同意はとれているが感情が動いていない。クローザー引き継ぎ時に温度感を申し送ること'
  },
  closer:{
    intent:12, positive:6, total:20,
    goodCond:   function(i,p,t){return t>=20 && p>=6 && (t>0?p/t:0)>=0.25;},
    warnCond:   function(i,p,t){return t>=10 && p<6;},
    dangerCond: function(i,p,t){return t>=12 && p<3 && (t>0?p/t:0)<0.2;},
    goodMsg:  '🔥 成約圏！クロージングへ進めてOK',
    warnMsg:  'ポジティブ反応をもっと引き出して。ピカチュウ・逆説クロージング・キャラ一致を使って',
    dangerMsg:'⚠️ 意図的YESは多いが感情が動いていない。失注パターン。訴求軸を変えて'
  }
};

function getYesGoals(){return YES_GOALS_BY_MODE[mode]||YES_GOALS_BY_MODE.closer;}

function updateYesGoalLabels(){
  var g=getYesGoals();
  var s=document.getElementById('yes-mode-sub');
  if(s) s.textContent='目標：意図的'+g.intent+' / ポジ'+g.positive+'以上';
  var li=document.getElementById('yes-label-intent');
  if(li) li.textContent='目標'+g.intent;
  var lp=document.getElementById('yes-label-positive');
  if(lp) lp.textContent='目標'+g.positive;
  var lt=document.getElementById('yes-label-total');
  if(lt) lt.textContent='/ 目標'+g.total;
}

function addYes(type, delta){
  if(type==='intent'){
    yesIntent=Math.max(0, yesIntent+delta);
    if(delta>0) showNotif('🎯 意図的YES +1','意図的:'+yesIntent+' / ポジ:'+yesPositive);
    else showNotif('🎯 意図的YES −1','意図的:'+yesIntent+' / ポジ:'+yesPositive);
  } else {
    yesPositive=Math.max(0, yesPositive+delta);
    if(delta>0) showNotif('✨ ポジティブ反応 +1','意図的:'+yesIntent+' / ポジ:'+yesPositive);
    else showNotif('✨ ポジティブ反応 −1','意図的:'+yesIntent+' / ポジ:'+yesPositive);
  }
  renderSheet();renderYes();
}

function renderYes(){
  if(!document.getElementById('yes-num-intent')) return;
  var g=getYesGoals();
  var tot=yesIntent+yesPositive;
  var pctI=Math.min(100,Math.round(yesIntent/g.intent*100));
  var pctP=Math.min(100,Math.round(yesPositive/g.positive*100));
  var pctT=Math.min(100,Math.round(tot/g.total*100));
  var posiRatio=tot>0?yesPositive/tot:0;

  document.getElementById('yes-num-intent').textContent=yesIntent;
  document.getElementById('yes-num-positive').textContent=yesPositive;
  document.getElementById('yes-num-total').textContent=tot;
  document.getElementById('yes-fill-intent').style.width=pctI+'%';
  document.getElementById('yes-fill-positive').style.width=pctP+'%';
  document.getElementById('yes-fill-total').style.width=pctT+'%';
  document.getElementById('yes-pct-intent').textContent=pctI+'%';
  document.getElementById('yes-pct-positive').textContent=pctP+'%';

  // 目標達成したらバー色を強調
  document.getElementById('yes-fill-intent').style.background=yesIntent>=g.intent?'var(--green)':'var(--navy)';
  document.getElementById('yes-fill-positive').style.background=yesPositive>=g.positive?'#2e7d32':'var(--green)';

  // アラート判定（モード別）
  var alertEl=document.getElementById('yes-alert');
  alertEl.className='';alertEl.innerHTML='';
  if(tot===0) return;

  var details='意図的'+yesIntent+'回 / ポジ'+yesPositive+'回 / 合計'+tot+'回';
  if(mode==='closer') details+=' / ポジ率'+Math.round(posiRatio*100)+'%';

  if(g.goodCond(yesIntent,yesPositive,tot)){
    alertEl.className='alert-good';
    alertEl.innerHTML='<div class="yes-alert-title">'+g.goodMsg+'</div><div class="yes-alert-body">'+details+'</div>';
  } else if(g.dangerCond(yesIntent,yesPositive,tot)){
    alertEl.className='alert-danger';
    alertEl.innerHTML='<div class="yes-alert-title">'+g.dangerMsg+'</div><div class="yes-alert-body">現在：'+details+'</div>';
  } else if(g.warnCond(yesIntent,yesPositive,tot)){
    alertEl.className='alert-warn';
    var shortP=g.positive-yesPositive;
    alertEl.innerHTML='<div class="yes-alert-title">△ '+g.warnMsg+'</div><div class="yes-alert-body">ポジ反応あと'+shortP+'回で目標。合計'+tot+'/'+g.total+'回</div>';
  }
}

function renderSheet(){
  var body=document.getElementById('sheet-body');
  if(!body) return;
  body.innerHTML=SHEET_SCHEMA.map(function(row){
    if(row.section)return'<span class="sheet-section-head">'+row.section+'</span>';
    var k=row.key,html='';
    if(k==='_edu'){html=hearing.edu?'<span class="tag">'+hearing.edu+'</span>':'<span class="empty">—</span>';}
    else if(k==='_yes_intent'){html='<span class="tag" style="background:var(--navy)">🎯 '+yesIntent+'回</span>';}
    else if(k==='_yes_positive'){html='<span class="tag" style="background:var(--green)">✨ '+yesPositive+'回</span>';}
    else if(k==='_yes_total'){var tot=yesIntent+yesPositive;html='<span class="tag" style="background:var(--orange)">合計 '+tot+'回</span>'+(tot>=8?'<span class="tag" style="background:var(--green);margin-left:4px">🔥 クロージング圏</span>':tot>=5?'<span class="tag yellow" style="margin-left:4px">△ あと'+(8-tot)+'回</span>':'');}
    else if(k==='_flags'){
      var fh='';
      if(flags.needsWeak)fh+='<span class="tag yellow">⚠️ ニーズ薄</span>';
      if(flags.visionVague)fh+='<span class="tag yellow">⚠️ ビジョン未定</span>';
      if(flags.studyHard)fh+='<span class="tag red">🚫 勉強困難</span>';
      html=fh||'<span class="empty">—</span>';
    }else if(k==='ice'){if(hearing.ice){var grp=KEY_GROUPS.find(function(g){return g.iceGroup;});var item=grp?grp.keys.find(function(ki){return ki.val===hearing.ice}):null;html=item?'<span class="tag orange">'+item.text+'</span>':'<span class="empty">—</span>';}else html='<span class="empty">—</span>';}
    else if(k==='_ice_temp'){
      if(!iceTemp||!hearing.ice){html='<span class="empty">—</span>';}
      else{var itconf={cold:{bg:'#E3F2FD',c:'#1565C0',icon:'🧊',t:'まだ固い'},warm:{bg:'#E8F5E9',c:'#2E7D32',icon:'😊',t:'雰囲気和んだ'},hot:{bg:'#FFF3E0',c:'#E65100',icon:'😂',t:'笑い取れた'}};var itc=itconf[iceTemp];html='<span class="tag" style="background:'+itc.bg+';color:'+itc.c+'">'+itc.icon+' '+itc.t+'</span>';}
    }
    else if(k==='age'){html=hearing.age?'<span class="tag green">'+hearing.age+'歳</span>':'<span class="empty">—</span>';}
    else if(k==='selectedJob'){html=hearing.selectedJob?'<span class="tag teal">'+hearing.selectedJob+'</span>':'<span class="empty">—</span>';}
    else if(k==='attrKeys'){html=hearing.attrKeys.length?hearing.attrKeys.map(function(val){var ak=ATTR_KEYWORDS.find(function(a){return a.val===val});return ak?'<span class="tag teal">'+ak.text+'</span>':''}).join(''):'<span class="empty">—</span>';}
    else if(Array.isArray(hearing[k])){html=hearing[k].length?hearing[k].map(function(v){return'<span class="tag">'+v+'</span>'}).join(''):'<span class="empty">—</span>';}
    else if(k==='transfer'){html=hearing.transfer?'<span class="tag orange">'+TRANSFER_LABELS[hearing.transfer]+'</span>':'<span class="empty">—</span>';}
    else if(k==='attr'){html=hearing.attr?'<span class="tag orange">'+ATTR_LABELS[hearing.attr]+'</span>':'<span class="empty">—</span>';}
    else{var val=hearing[k];html=val?'<span class="tag green">'+val+'</span>':'<span class="empty">—</span>';}
    return'<div class="sheet-row"><div class="sheet-label">'+row.label+'</div><div class="sheet-val">'+html+'</div></div>';
  }).join('');
}

// ============================================================
// ガイド描画：職業別トークを差し込む
// ============================================================
function renderBlockHtml(b){
  if(b.type==='talk')return'<div class="talk-line '+(b.cls||'')+'">'+b.text+'</div>';
  if(b.type==='note')return'<div class="guide-note '+(b.cls||'')+'">'+b.text+'</div>';
  if(b.type==='yes_check'){
    var t=b.ytype||'intent';
    var pill=t==='intent'?'<span class="yck-type intent">🎯 意図的YES</span>':'<span class="yck-type positive">✨ ポジティブ反応</span>';
    return'<div class="yes-check-block">'+
      '<span class="yes-check-label">'+pill+b.label+'</span>'+
      '<div class="yes-check-btns">'+
        '<button class="ycb-btn minus" onclick="addYes(\''+t+'\',-1)">－</button>'+
        '<button class="ycb-btn '+t+'" onclick="addYes(\''+t+'\',1)">＋ 記録</button>'+
      '</div>'+
    '</div>';
  }
  return'';
}

function renderGuide(){
  var steps=getSteps();
  var s=steps[currentStep];
  if(!s)return;
  var isBridgeEnd=(mode==='bridge'&&s.bridgeEnd);
  var head=document.getElementById('guide-step-head');
  if(!head) return;
  head.className=isBridgeEnd?'bridge-head':'';
  document.getElementById('guide-step-num').textContent='STEP '+String(currentStep+1).padStart(2,'0')+' / '+steps.length+(mode==='bridge'?' 🔗':' ⚡');
  document.getElementById('guide-step-title').textContent=s.name;
  document.getElementById('guide-step-sub').textContent=s.sub;
  document.getElementById('guide-goal').textContent='🎯 '+s.goal;
  renderJobBadge();

  var body=document.getElementById('guide-body');
  body.innerHTML=s.guide.map(function(block){
    var items=block.blocks.map(function(b){
      // job-talkプレースホルダーを職業別トークで差し替え
      if(b.cls==='job-talk'){
        var jt=getJobTalksForStep(s.id==='career'?'career':s.id==='now'?'now':s.id==='vision'?'vision':null);
        if(jt&&jt.talks){
          return jt.talks.map(function(t){return'<div class="talk-line job-talk">'+t+'</div>';}).join('');
        }else{
          return'<div class="talk-line job-talk" style="opacity:.5">（左カラムで職業をタップすると職業別トークが表示されます）</div>';
        }
      }
      return renderBlockHtml(b);
    }).join('');
    return'<div class="guide-block"><div class="guide-block-label">'+block.label+'</div>'+items+'</div>';
  }).join('');
  renderNav();
}

function renderStepper(){
  var steps=getSteps();
  var el=document.getElementById('stepper');
  if(!el) return;
  var html='';
  steps.forEach(function(s,i){
    if(i>0)html+='<div class="step-connector '+(i<=currentStep?'done':'')+'"></div>';
    var cls=i===currentStep?'active':i<currentStep?'done':'';
    if(mode==='bridge'&&s.bridgeEnd)cls+=' bridge-end';
    html+='<div class="step-pip '+cls+'" onclick="goTo('+i+')" title="'+s.name+'">'+(i+1)+'</div>';
  });
  el.innerHTML=html;
  var s=steps[currentStep];
  document.getElementById('header-badge').textContent=s?s.name:'—';
}

function renderNav(){
  var steps=getSteps();
  document.getElementById('nav-prev').disabled=currentStep===0;
  document.getElementById('nav-next').disabled=currentStep===steps.length-1;
  document.getElementById('nav-label').textContent=(currentStep+1)+' / '+steps.length;
}

function next(){
  var steps=getSteps();var s=steps[currentStep];
  if(mode==='bridge'&&s&&s.bridgeEnd){showBridgeConfirm();return;}
  if(currentStep<steps.length-1){currentStep++;closeBridgeConfirm();renderGuide();renderStepper();}
}
function prev(){if(currentStep>0){currentStep--;closeBridgeConfirm();renderGuide();renderStepper();}}
function goTo(i){currentStep=i;closeBridgeConfirm();renderGuide();renderStepper();}
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});

function showNotif(title,sub){
  if(notifTimer)clearTimeout(notifTimer);
  var el=document.getElementById('app-notif')||document.getElementById('notif');
  if(!el) return;
  el.innerHTML='<strong>'+title+'</strong>'+(sub?'　'+sub:'');
  el.classList.add('show');
  notifTimer=setTimeout(function(){el.classList.remove('show')},2500);
}

function resetAll(){
  if(!confirm('ヒアリング情報をリセットしますか？'))return;
  currentStep=0;yesIntent=0;yesPositive=0;iceTemp=null;tappedKeys.clear();
  clientResult=null;
  ['won','pending','cut','bridge','lost','money'].forEach(function(r){document.getElementById('rb-'+r).className='result-btn';});
  document.getElementById('ci-name').value='';
  document.getElementById('ci-datetime').value='';
  document.getElementById('save-btn').disabled=true;
  flags={needsWeak:false,visionVague:false,studyHard:false};
  hearing={ice:null,age:null,edu:null,location:[],job:[],career:[],transfer:null,income:[],dream:[],concern:[],attr:null,budget:null,motivation:null,attrKeys:[],selectedJob:null};
  closeAttrFlash();closeNeedsWeakBanner();closeBridgeConfirm();renderAll();
}

function renderAll(){renderKeys();renderSheet();renderGuide();renderStepper();updateYesGoalLabels();renderYes();renderIceBadge();}

// アプリ起動

window.addEventListener('DOMContentLoaded', function() {
  initApp();
});
